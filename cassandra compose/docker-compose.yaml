version: "3.8"

services:
  cassandra-node-0:
    image: cassandra:4.1
    container_name: cassandra-node-0
    environment:
      - CASSANDRA_SEEDS=cassandra-node-0
      - CASSANDRA_CLUSTER_NAME=MyCluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=datacenter11
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=200M
    ports:
      - "7000:7000"
      - "7001:7001"
      - "9042:9042"
    volumes:
      - cassandra-data-0:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN\\s+'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  cassandra-node-1:
    image: cassandra:4.1
    container_name: cassandra-node-1
    depends_on:
      cassandra-node-0:
        condition: service_healthy
    environment:
      - CASSANDRA_SEEDS=cassandra-node-0
      - CASSANDRA_CLUSTER_NAME=MyCluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=datacenter11
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=200M
    ports:
      - "17000:7000"
      - "17001:7001"
      - "19042:9042"
    volumes:
      - cassandra-data-1:/var/lib/cassandra

  cassandra-node-2:
    image: cassandra:4.1
    container_name: cassandra-node-2
    depends_on:
      cassandra-node-1:
        condition: service_started
      cassandra-node-0:
        condition: service_healthy
    environment:
      - CASSANDRA_SEEDS=cassandra-node-0
      - CASSANDRA_CLUSTER_NAME=MyCluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=datacenter11
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=200M
    ports:
      - "27000:7000"
      - "27001:7001"
      - "29042:9042"
    volumes:
      - cassandra-data-2:/var/lib/cassandra

volumes:
  cassandra-data-0:
  cassandra-data-1:
  cassandra-data-2: